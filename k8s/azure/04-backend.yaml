apiVersion: v1
kind: Service
metadata:
  name: backend-api
  namespace: wendev
  labels:
    app.kubernetes.io/name: backend-api
    app.kubernetes.io/part-of: wendev-tickets
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: backend-api
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: wendev
  labels:
    app.kubernetes.io/name: backend-api
    app.kubernetes.io/part-of: wendev-tickets
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: backend-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend-api
        app.kubernetes.io/part-of: wendev-tickets
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: backend-api
                topologyKey: kubernetes.io/hostname
      containers:
        - name: backend-api
          image: __ACR_LOGIN_SERVER__/wendev-tickets-backend:v1
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: tickets-config
                  key: NODE_ENV
            - name: PGHOST
              valueFrom:
                configMapKeyRef:
                  name: tickets-config
                  key: PGHOST
            - name: PGPORT
              valueFrom:
                configMapKeyRef:
                  name: tickets-config
                  key: PGPORT
            - name: PGDATABASE
              valueFrom:
                configMapKeyRef:
                  name: tickets-config
                  key: PGDATABASE
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: tickets-secret
                  key: PGUSER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: tickets-secret
                  key: PGPASSWORD
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 8
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

