apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wendev-tickets
  namespace: wendev
  labels:
    app.kubernetes.io/part-of: wendev-tickets
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-api
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
